name: Pipeline de CI

on:
  push:
    branches:
      - test

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: configurar node
        uses: actions/checkout@v4
        with:
          node-version: "20"

      - name: Instalar app
        run: npm  install

      - name: Execuatar test
        run: npm test

      - name: Deploy na Render
        env:
          RENDER_DEPLOY_HOOK: ${{secrets.RENDER_DEPLOY_HOOK}}
        run: curl -X POST  "$RENDER_DEPLOY_HOOK"
