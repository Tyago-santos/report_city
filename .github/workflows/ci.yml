name: Pipeline de CI

on:
  push:
    branches:
      - test

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: configurar node
        uses: actions/checkout@v4
        with:
          node-version: "20"

      - name: Instalar app
        run: npm  install

      - name: Execuatar test
        run: npm test

